services:
  cursor-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor-openai-proxy:latest
    restart: unless-stopped
    # Reap zombie child processes from Cursor SDK agent runs and forward signals fast.
    init: true
    ports:
      - "${PORT:-3000}:3000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - "${CURSOR_WORKSPACE:-./workspace}:/workspace"
      - cursor-state:/data

volumes:
  cursor-state:
